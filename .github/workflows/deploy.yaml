  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [validate-specs, web-coverage, checkov-scan, require-pr-for-main]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Update blog submodule to latest main
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive --remote blog
          echo "Using latest blog submodule revision: $(git -C "$GITHUB_WORKSPACE/blog" rev-parse --short HEAD)"

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Import existing VNet into state (if present)
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_cf_api_token: ${{ secrets.CF_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CF_ZONE_ID }}
        run: |
          RESOURCE_GROUP_NAME="$(tofu output -raw resource_group_name)"
          SUBSCRIPTION_SUFFIX="${ARM_SUBSCRIPTION_ID:0:8}"
          VNET_NAME="workout-vnet-${SUBSCRIPTION_SUFFIX}"
          VNET_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP_NAME}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}"

          if tofu state show azurerm_virtual_network.private_endpoints >/dev/null 2>&1; then
            echo "VNet already managed in state."
            exit 0
          fi

          if az network vnet show --resource-group "$RESOURCE_GROUP_NAME" --name "$VNET_NAME" >/dev/null 2>&1; then
            echo "Importing existing VNet into state: ${VNET_NAME}"
            tofu import azurerm_virtual_network.private_endpoints "$VNET_ID"
          else
            echo "No pre-existing VNet named ${VNET_NAME}; normal create path will be used."
          fi

      - name: Fail Fast if deploy principal lacks required RBAC
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          RESOURCE_GROUP_NAME="$(tofu output -raw resource_group_name)"
          KEY_VAULT_NAME="$(tofu output -raw key_vault_name)"

          RG_SCOPE="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP_NAME}"
          KV_SCOPE="$(az keyvault show --name "$KEY_VAULT_NAME" --resource-group "$RESOURCE_GROUP_NAME" --query id -o tsv)"

          role_count() {
            local scope="$1"
            local role="$2"
            az role assignment list \
              --assignee "$ARM_CLIENT_ID" \
              --scope "$scope" \
              --include-inherited \
              --query "[?roleDefinitionName=='${role}'] | length(@)" \
              -o tsv
          }

          HAS_UAA="$(role_count "$RG_SCOPE" "User Access Administrator")"
          HAS_OWNER="$(role_count "$RG_SCOPE" "Owner")"
          HAS_KV_OFFICER="$(role_count "$KV_SCOPE" "Key Vault Secrets Officer")"

          if [ "$HAS_UAA" -eq 0 ] && [ "$HAS_OWNER" -eq 0 ]; then
            echo "Missing required control-plane role for deploy principal."
            echo "Need 'User Access Administrator' or 'Owner' at scope: $RG_SCOPE"
            exit 1
          fi

          if [ "$HAS_KV_OFFICER" -eq 0 ]; then
            echo "Missing required Key Vault data-plane role for deploy principal."
            echo "Need 'Key Vault Secrets Officer' at scope: $KV_SCOPE"
            exit 1
          fi

          echo "RBAC preflight passed: deploy principal has required roles."

      - name: Tofu Apply (Provision Infrastructure + Bind Custom Domain)
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          tofu apply -auto-approve \
            -var="cf_api_token=${{ secrets.CF_API_TOKEN }}" \
            -var="cloudflare_zone_id=$CLOUDFLARE_ZONE_ID" \
            -var="enable_custom_domain=true" \
            -var="allow_azure_services_postgres=true" \
            -var="manage_blog_validation_record=false" \
            -var="manage_key_vault_role_assignments=true"

      - name: Wait For Public DNS Propagation
        run: |
          SWA_HOSTNAME="$(tofu output -raw swa_default_hostname)"
          DOMAIN_NAME="$(tofu output -raw cloudflare_record_hostname)"

          echo "Waiting for public DNS for '$DOMAIN_NAME' to become available..."

          for i in {1..40}; do
            CNAME_TARGET="$(dig +short CNAME "$DOMAIN_NAME" | sed 's/\.$//' | head -n 1)"
            A_RECORDS="$(dig +short A "$DOMAIN_NAME" | paste -sd ',' -)"
            AAAA_RECORDS="$(dig +short AAAA "$DOMAIN_NAME" | paste -sd ',' -)"

            if [ "$CNAME_TARGET" = "$SWA_HOSTNAME" ]; then
              echo "DNS is propagated via CNAME."
              exit 0
            fi

            if [ -n "$A_RECORDS" ] || [ -n "$AAAA_RECORDS" ]; then
              echo "DNS is propagated via address records (likely proxied by Cloudflare)."
              exit 0
            fi

            echo "Attempt $i/40: cname='$CNAME_TARGET' a='$A_RECORDS' aaaa='$AAAA_RECORDS' (waiting 15s)"
            sleep 15
          done

          echo "Public DNS propagation did not complete in time."
          exit 1

      - name: Seed PostgreSQL schema via private SQL runner
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          KEY_VAULT_NAME="$(tofu output -raw key_vault_name)"
          DATABASE_URL="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name database-url --query value -o tsv)"
          RESOURCE_GROUP_NAME="$(tofu output -raw resource_group_name)"
          SUBSCRIPTION_SUFFIX="${ARM_SUBSCRIPTION_ID:0:8}"
          SQL_RUNNER_NAME="workout-sql-runner-${SUBSCRIPTION_SUFFIX}"
          VNET_NAME="workout-vnet-${SUBSCRIPTION_SUFFIX}"
          SCHEMA_SQL_B64="$(
            {
              cat "$GITHUB_WORKSPACE/blog/db/baseline/main.sql"
              printf '\n'
              for f in $(find "$GITHUB_WORKSPACE/blog/db/migrations" -name '*.up.sql' | sort); do
                cat "$f"
                printf '\n'
              done
            } | base64 -w0
          )"

          cleanup_sql_runner() {
            az container delete \
              --resource-group "$RESOURCE_GROUP_NAME" \
              --name "$SQL_RUNNER_NAME" \
              --yes \
              --no-wait >/dev/null 2>&1 || true
          }
          trap cleanup_sql_runner EXIT

          SCHEMA_COMMAND="sh -lc 'printf \"%s\" \"\$SCHEMA_SQL_B64\" | base64 -d | psql \"\$DATABASE_URL\" -v ON_ERROR_STOP=1'"

          az container create \
            --resource-group "$RESOURCE_GROUP_NAME" \

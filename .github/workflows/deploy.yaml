name: Deploy Training Log

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-specs:
    name: Validate Specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Spectral (OpenAPI linter)
        run: |
          npm install -g @stoplight/spectral-cli
          npm install @stoplight/spectral-rulesets

      - name: Validate OpenAPI spec
        run: spectral lint specs/openapi/blog-api.yaml

  tofu-plan:
    name: Tofu Plan (PR)
    runs-on: ubuntu-latest
    needs: validate-specs
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Tofu Plan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          tofu plan -out=tfplan \
            -var="cf_api_token=${{ secrets.CF_API_TOKEN }}" \
            -var="cloudflare_zone_id=$CLOUDFLARE_ZONE_ID" \
            -var="cloudflare_proxied=false" \
            -var="enable_custom_domain=false"

          tofu show -no-color tfplan > plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tofu-plan-${{ github.event.pull_request.number }}
          path: infra/opentofu/azure/plan.txt

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate-specs
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Tofu Apply (Provision Infrastructure + Bind Custom Domain)
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          tofu apply -auto-approve \
            -var="cf_api_token=${{ secrets.CF_API_TOKEN }}" \
            -var="cloudflare_zone_id=$CLOUDFLARE_ZONE_ID" \
            -var="cloudflare_proxied=false" \
            -var="enable_custom_domain=true"

      - name: Wait For DNS Propagation
        run: |
          SWA_HOSTNAME="$(tofu output -raw swa_default_hostname)"
          DOMAIN_NAME="$(tofu output -raw cloudflare_record_hostname)"

          echo "Waiting for DNS to point '$DOMAIN_NAME' at '$SWA_HOSTNAME'..."

          for i in {1..40}; do
            RESOLVED="$(dig +short CNAME "$DOMAIN_NAME" | sed 's/\.$//')"

            if [ "$RESOLVED" = "$SWA_HOSTNAME" ]; then
              echo "DNS is propagated."
              exit 0
            fi

            echo "Attempt $i/40: cname='$RESOLVED' (waiting 15s)"
            sleep 15
          done

          echo "DNS propagation did not complete in time."
          exit 1

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Seed PostgreSQL schema
        run: |
          KEY_VAULT_NAME="$(tofu output -raw key_vault_name)"
          DATABASE_URL="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name database-url --query value -o tsv)"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$GITHUB_WORKSPACE/blog/schema.sql"

      - name: Get SWA deployment token
        id: swa_token
        run: echo "token=$(tofu output -raw swa_api_key)" >> "$GITHUB_OUTPUT"

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: blog
          api_location: blog/api
          api_build_command: npm run build
          output_location: dist

      - name: Wait For SWA Custom Domain Validation
        run: |
          SWA_NAME="$(tofu output -raw swa_name)"
          RG_NAME="$(tofu output -raw resource_group_name)"
          DOMAIN_NAME="$(tofu output -raw cloudflare_record_hostname)"

          echo "Waiting for custom domain '$DOMAIN_NAME' to reach Ready state..."

          for i in {1..60}; do
            STATUS="$(az staticwebapp hostname show \
              --name "$SWA_NAME" \
              --resource-group "$RG_NAME" \
              --hostname "$DOMAIN_NAME" \
              --query status \
              --output tsv 2>/dev/null || true)"

            if [ "$STATUS" = "Ready" ]; then
              echo "Custom domain is Ready."
              exit 0
            fi

            echo "Attempt $i/60: status='$STATUS' (waiting 15s)"
            sleep 15
          done

          echo "Custom domain validation did not reach Ready state in time."
          exit 1

      - name: Tofu Apply (Enable Cloudflare Proxy)
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          tofu apply -auto-approve \
            -var="cf_api_token=${{ secrets.CF_API_TOKEN }}" \
            -var="cloudflare_zone_id=$CLOUDFLARE_ZONE_ID" \
            -var="cloudflare_proxied=true" \
            -var="enable_custom_domain=true"

name: Refresh ACI On GHCR Latest Change

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  id-token: write

env:
  GHCR_IMAGE: ghcr.io/icornett/training-log
  ACI_RESOURCE_GROUP: icornett-ae-workout-blog
  ACI_CONTAINER_GROUP: training-log

jobs:
  detect-and-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Read GHCR latest digest
        id: digest
        env:
          PREVIOUS_DIGEST: ${{ vars.GHCR_LATEST_DIGEST }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          set -euo pipefail

          REPO_PATH="${GHCR_IMAGE#ghcr.io/}"

          TOKEN=$(curl -fsSL -u "${{ github.repository_owner }}:${GHCR_PAT}" "https://ghcr.io/token?scope=repository:${REPO_PATH}:pull" | python3 -c "import sys, json; print(json.load(sys.stdin)['token'])")
          DIGEST=$(curl -fsSI -H "Authorization: Bearer $TOKEN" "https://ghcr.io/v2/${REPO_PATH}/manifests/latest" | awk -F': ' 'tolower($1)=="docker-content-digest"{gsub("\r", "", $2); print $2}')

          if [ -z "$DIGEST" ]; then
            echo "Failed to resolve latest digest for ${GHCR_IMAGE}" >&2
            exit 1
          fi

          echo "current=$DIGEST" >> "$GITHUB_OUTPUT"

          if [ "$DIGEST" != "$PREVIOUS_DIGEST" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "GHCR latest digest changed: ${PREVIOUS_DIGEST:-<none>} -> $DIGEST"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "GHCR latest digest unchanged: $DIGEST"
          fi

      - name: Azure Login
        if: steps.digest.outputs.changed == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart ACI container group
        if: steps.digest.outputs.changed == 'true'
        run: |
          az container restart \
            --resource-group "$ACI_RESOURCE_GROUP" \
            --name "$ACI_CONTAINER_GROUP"

      - name: Persist digest in repository variable
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DIGEST: ${{ steps.digest.outputs.current }}
        run: |
          set -euo pipefail

          if gh api "repos/${REPO}/actions/variables/GHCR_LATEST_DIGEST" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${REPO}/actions/variables/GHCR_LATEST_DIGEST" \
              -f name="GHCR_LATEST_DIGEST" \
              -f value="$DIGEST"
          else
            gh api \
              --method POST \
              "repos/${REPO}/actions/variables" \
              -f name="GHCR_LATEST_DIGEST" \
              -f value="$DIGEST"
          fi

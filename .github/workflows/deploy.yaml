      - name: Get SWA deployment token
        id: swa_token
        run: echo "token=$(tofu output -raw swa_api_key)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            blog/package-lock.json
            blog/api/package-lock.json

      - name: Build web app
        working-directory: blog
        run: |
          npm ci --ignore-scripts
          npm --prefix api ci
          NODE_ENV=production npm run build

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: blog/dist
          api_location: blog/api
          api_build_command: npm run build
          skip_app_build: true
        env:
          NODE_VERSION: 22

      - name: Wait For SWA Custom Domain Validation
        run: |
          SWA_NAME="$(tofu output -raw swa_name)"
          RG_NAME="$(tofu output -raw resource_group_name)"
          DOMAIN_NAME="$(tofu output -raw cloudflare_record_hostname)"

          echo "Waiting for custom domain '$DOMAIN_NAME' to reach Ready state..."

          for i in {1..60}; do
            STATUS="$(az staticwebapp hostname show \
              --name "$SWA_NAME" \
              --resource-group "$RG_NAME" \
              --hostname "$DOMAIN_NAME" \
              --query status \
              --output tsv 2>/dev/null || true)"

            if [ "$STATUS" = "Ready" ]; then
              echo "Custom domain is Ready."
              exit 0
            fi

            echo "Attempt $i/60: status='$STATUS' (waiting 15s)"
            sleep 15
          done

          echo "Custom domain validation did not reach Ready state in time."
          exit 1

      - name: Purge Cloudflare Cache
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          DOMAIN_NAME="$(tofu output -raw cloudflare_record_hostname)"

          echo "Purging Cloudflare cache for $DOMAIN_NAME..."

          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything": true}' | jq .

          echo "Cache purged."

      - name: Export production URL
        id: prod_url
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          DOMAIN_NAME="$(tofu output -raw cloudflare_record_hostname)"
          echo "url=https://${DOMAIN_NAME}" >> "$GITHUB_OUTPUT"
    outputs:
      production_url: ${{ steps.prod_url.outputs.url }}

  post-deploy-e2e:
    name: Post-Deploy E2E (Production)
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    env:
      BASE_URL: ${{ needs.deploy.outputs.production_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Update blog submodule to latest main
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive --remote blog
          echo "Using blog submodule revision: $(git -C "$GITHUB_WORKSPACE/blog" rev-parse --short HEAD)"

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Seed production database for E2E
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          KEY_VAULT_NAME="$(tofu output -raw key_vault_name)"
          DATABASE_URL="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name database-url --query value -o tsv)"
          RESOURCE_GROUP_NAME="$(tofu output -raw resource_group_name)"
          SUBSCRIPTION_SUFFIX="${ARM_SUBSCRIPTION_ID:0:8}"
          SQL_RUNNER_NAME="workout-sql-runner-${SUBSCRIPTION_SUFFIX}"
          VNET_NAME="workout-vnet-${SUBSCRIPTION_SUFFIX}"
          SEED_SQL_B64="$(base64 -w0 "$GITHUB_WORKSPACE/blog/tests/e2e/seed/real-db-seed.sql")"

          cleanup_sql_runner() {
            az container delete \
              --resource-group "$RESOURCE_GROUP_NAME" \
              --name "$SQL_RUNNER_NAME" \
              --yes \
              --no-wait >/dev/null 2>&1 || true
          }
          trap cleanup_sql_runner EXIT

          SEED_COMMAND="sh -lc 'printf \"%s\" \"\$SEED_SQL_B64\" | base64 -d | psql \"\$DATABASE_URL\" -v ON_ERROR_STOP=1'"

          az container create \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --name "$SQL_RUNNER_NAME" \
            --image "postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416" \
            --os-type Linux \
            --cpu 0.5 \
            --memory 1 \
            --ip-address Private \
            --vnet "$VNET_NAME" \
            --subnet sql-runner \
            --restart-policy Never \
            --command-line "$SEED_COMMAND" \
            --secure-environment-variables \
            DATABASE_URL="$DATABASE_URL" \
            SEED_SQL_B64="$SEED_SQL_B64"

          RUN_STATE=""
          for i in $(seq 1 60); do
            RUN_STATE="$(az container show --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" --query 'containers[0].instanceView.currentState.state' -o tsv 2>/dev/null || true)"
            EXIT_CODE="$(az container show --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" --query 'containers[0].instanceView.currentState.exitCode' -o tsv 2>/dev/null || true)"

            if [ "$RUN_STATE" = "Terminated" ]; then
              if [ "$EXIT_CODE" = "0" ]; then
                echo "SQL runner seeding completed successfully."
                break
              fi

              echo "SQL runner failed with exit code ${EXIT_CODE:-unknown}."
              az container logs --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" || true
              exit 1
            fi

            echo "Waiting for SQL runner to finish (${i}/60)..."
            sleep 10
          done

          if [ "$RUN_STATE" != "Terminated" ]; then
            echo "SQL runner did not finish in time."
            az container logs --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" || true
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            blog/package-lock.json
            blog/api/package-lock.json

      - name: Install dependencies
        working-directory: blog
        run: |
          npm ci --ignore-scripts
          npm --prefix api ci

      - name: Install Playwright browsers
        working-directory: blog
        run: npx playwright install --with-deps chromium webkit

      - name: Wait for production deployment to be healthy
        run: |
          MAX_RETRIES=30
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES: Checking production health at $BASE_URL..."
            if curl -sf --connect-timeout 5 "$BASE_URL/login" > /dev/null 2>&1; then
              echo "✓ Production deployment is healthy and responsive"
              exit 0
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "  Not ready yet. Waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "✗ Production deployment did not become healthy within $((MAX_RETRIES * RETRY_DELAY))s"
          exit 1

      - name: Run real-db Playwright tests against production
        working-directory: blog
        run: npm run test:e2e:real-db

      - name: Tear down SQL runner
        if: always()
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          RESOURCE_GROUP_NAME="$(tofu output -raw resource_group_name 2>/dev/null || true)"
          SUBSCRIPTION_SUFFIX="${ARM_SUBSCRIPTION_ID:0:8}"
          SQL_RUNNER_NAME="workout-sql-runner-${SUBSCRIPTION_SUFFIX}"

          if [ -z "$RESOURCE_GROUP_NAME" ]; then
            echo "Could not determine resource group; skipping SQL runner cleanup."
            exit 0
          fi

          if az container show --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" >/dev/null 2>&1; then
            echo "Deleting SQL runner: $SQL_RUNNER_NAME"
            az container delete \
              --resource-group "$RESOURCE_GROUP_NAME" \
              --name "$SQL_RUNNER_NAME" \
              --yes
            echo "SQL runner deleted."
          else
            echo "SQL runner not found; nothing to clean up."
          fi

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-production-${{ github.run_id }}-${{ github.run_attempt }}
          path: blog/test-results/
          retention-days: 30
          compression-level: 9

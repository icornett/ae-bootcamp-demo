name: Deploy Training Log

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, closed]
  repository_dispatch:
    types: [training-log-release, training-log-pr-staging]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch' && github.event.action == 'training-log-release'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pull_request_number: ${{ steps.cpr.outputs.pull-request-number }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update blog submodule to release tag
        env:
          RELEASE_TAG: ${{ github.event.client_payload.tag }}
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive blog
          git -C "$GITHUB_WORKSPACE/blog" fetch --force --tags origin

          if [ -n "$RELEASE_TAG" ]; then
            git -C "$GITHUB_WORKSPACE/blog" checkout --force "$RELEASE_TAG"
            echo "Using training-log release tag: $RELEASE_TAG"
          else
            latest_tag="$(git -C "$GITHUB_WORKSPACE/blog" tag -l 'v[0-9]*' --sort=-version:refname | head -n 1)"
            test -n "$latest_tag" || { echo "Error: No version tags found in blog submodule"; exit 1; }
            git -C "$GITHUB_WORKSPACE/blog" checkout --force "$latest_tag"
            echo "Using fallback latest tag: $latest_tag"
          fi

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_TOKEN_PAT }}
          commit-message: "chore: update training-log submodule"
          title: "chore: update training-log release"
          body: |
            This PR updates the `blog` submodule to the latest released training-log version.

            - Source tag: `${{ github.event.client_payload.tag }}`
            - Source SHA: `${{ github.event.client_payload.sha }}`
            - Source repo: `${{ github.event.client_payload.source_repo }}`

            Auto-merge is enabled; this will merge once required checks pass.
          branch: "release/training-log-${{ github.event.client_payload.tag || github.run_id }}"
          delete-branch: true
          add-paths: |
            blog

  enable-auto-merge:
    name: Enable Auto Merge
    runs-on: ubuntu-latest
    needs: release-pr
    if: github.event_name == 'repository_dispatch' && needs.release-pr.outputs.pull_request_number != ''
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge on release PR
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GH_TOKEN_PAT }}
          pull-request-number: ${{ needs.release-pr.outputs.pull_request_number }}
          merge-method: squash

  validate-specs:
    name: Validate Specs
    runs-on: ubuntu-latest
    if: github.event_name != 'repository_dispatch' && (github.event_name != 'pull_request' || github.event.action != 'closed')
    steps:
      - uses: actions/checkout@v7

      - name: Validate OpenAPI spec
        run: |
          npm install --no-save @stoplight/spectral-cli @stoplight/spectral-rulesets
          npx spectral lint specs/openapi/blog-api.yaml

  detect-blog-changes:
    name: Detect Blog Changes
    runs-on: ubuntu-latest
    if: github.event_name != 'repository_dispatch' && (github.event_name != 'pull_request' || github.event.action != 'closed')
    outputs:
      blog_changed: ${{ steps.filter.outputs.blog }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect blog path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            blog:
              - 'blog'
              - 'blog/**'

  web-coverage:
    name: Web Quality Gates
    runs-on: ubuntu-latest
    if: github.event_name != 'repository_dispatch' && (github.event_name != 'pull_request' || github.event.action != 'closed')
    needs: [validate-specs, detect-blog-changes]
    env:
      POSTGRES_IMAGE: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    defaults:
      run:
        working-directory: blog
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Skip blog tests when blog is unchanged
        if: needs.detect-blog-changes.outputs.blog_changed != 'true'
        run: echo "No blog changes detected; skipping Web Quality Gates test execution."

      - name: Use blog submodule commit from PR
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive blog
          echo "Using blog submodule revision from PR: $(git -C "$GITHUB_WORKSPACE/blog" rev-parse --short HEAD)"

      - name: Setup Node.js
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            blog/package-lock.json
            blog/api/package-lock.json

      - name: Install dependencies
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: |
          npm ci --ignore-scripts
          npm --prefix api ci

      - name: Run web tests with coverage
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: npm run test:web:ci

      - name: Install Playwright browsers
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Compute Postgres image manifest fingerprint
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        id: docker-manifest-hash-mobile
        run: |
          set -eu
          postgres_hash="$(docker manifest inspect "${POSTGRES_IMAGE}" | sha256sum | awk '{print $1}')"
          echo "postgres_hash=${postgres_hash}" >> "${GITHUB_OUTPUT}"

      - name: Restore cached Postgres image
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        id: docker-cache-postgres-mobile
        uses: actions/cache@v6
        with:
          path: /tmp/.docker-cache/postgres
          key: docker-${{ runner.os }}-postgres-16-alpine-${{ steps.docker-manifest-hash-mobile.outputs.postgres_hash }}

      - name: Load or pull Postgres image
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: |
          mkdir -p /tmp/.docker-cache/postgres
          if [ -f /tmp/.docker-cache/postgres/postgres-16-alpine.tar ]; then
            docker load -i /tmp/.docker-cache/postgres/postgres-16-alpine.tar
          else
            docker pull "${POSTGRES_IMAGE}"
          fi

      - name: Save Postgres image to cache
        if: needs.detect-blog-changes.outputs.blog_changed == 'true' && steps.docker-cache-postgres-mobile.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/.docker-cache/postgres
          docker save "${POSTGRES_IMAGE}" -o /tmp/.docker-cache/postgres/postgres-16-alpine.tar

      - name: Start Postgres container
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: |
          docker run -d --rm \
            --name training-log-mobile-postgres \
            -e POSTGRES_USER=traininglog \
            -e POSTGRES_PASSWORD=traininglog \
            -e POSTGRES_DB=training_log \
            -p 5432:5432 \
            "${POSTGRES_IMAGE}"

      - name: Wait for Postgres readiness
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: |
          for i in $(seq 1 30); do
            if docker exec training-log-mobile-postgres pg_isready -U traininglog -d training_log >/dev/null 2>&1; then
              echo "Postgres is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for Postgres."
          docker logs training-log-mobile-postgres || true
          exit 1

      - name: Install Azure Functions Core Tools
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: npm i -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Install PostgreSQL client
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply database schema
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: |
          npx --yes wait-port 127.0.0.1:5432 --timeout 30000
          PGPASSWORD=traininglog psql -h 127.0.0.1 -U traininglog -d training_log -f db/baseline/main.sql -v ON_ERROR_STOP=1
          for migration in $(find db/migrations -name '*.up.sql' | sort); do
            PGPASSWORD=traininglog psql -h 127.0.0.1 -U traininglog -d training_log -f "$migration" -v ON_ERROR_STOP=1
          done

      - name: Build API and Frontend
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: npm run build && npm run build:api

      - name: Run mobile Playwright tests (iOS + Android)
        if: needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: |
          npm run dev:api:func >/tmp/func.log 2>&1 &
          API_PID=$!
          cleanup() {
            kill "${API_PID}" 2>/dev/null || true
          }
          trap cleanup EXIT INT TERM
          if ! npx wait-on http://127.0.0.1:7071 --timeout 90000; then
            echo "Backend failed to start. Function logs:"
            cat /tmp/func.log
            exit 1
          fi
          sleep 2
          npm run test:e2e:mobile
        env:
          SESSION_SECRET: ci-mobile-session-secret
          AzureWebJobsStorage: UseDevelopmentStorage=true
          FUNCTIONS_WORKER_RUNTIME: node
          DISABLE_TIMER_TRIGGERS: "true"
          DATABASE_URL: postgresql://traininglog:traininglog@127.0.0.1:5432/training_log?sslmode=disable

      - name: Stop Postgres container
        if: always() && needs.detect-blog-changes.outputs.blog_changed == 'true'
        run: docker stop training-log-mobile-postgres || true

      - name: Publish test results
        if: always() && needs.detect-blog-changes.outputs.blog_changed == 'true'
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "blog/test-results/e2e-junit.xml"

      - name: Upload Playwright report
        if: always() && needs.detect-blog-changes.outputs.blog_changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-mobile
          path: blog/playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test artifacts
        if: always() && needs.detect-blog-changes.outputs.blog_changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-mobile
          path: blog/test-results/
          if-no-files-found: ignore

  checkov-scan:
    name: Infrastructure Security Scan (Checkov)
    runs-on: ubuntu-latest
    if: github.event_name != 'repository_dispatch' && (github.event_name != 'pull_request' || github.event.action != 'closed')
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Checkov
        run: pip install checkov==3.3.0

      - name: Show Checkov version
        run: checkov --version

      - name: Run Checkov scan on OpenTofu
        run: |
          checkov \
            --framework terraform \
            --directory infra/opentofu/azure \
            --compact \
            --output cli \
            --output sarif \
            --output-file-path console,checkov.sarif

      - name: Upload Checkov SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov.sarif

      - name: Upload Checkov SARIF artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: checkov-sarif-${{ github.run_id }}-${{ github.run_attempt }}
          path: checkov.sarif
          retention-days: 30

  require-pr-for-main:
    name: Require PR For Main
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Fail direct pushes to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          check_commit_for_pr() {
            local sha="$1"
            local url="https://api.github.com/repos/$GITHUB_REPOSITORY/commits/$sha/pulls"
            curl -fsSL \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$url"
          }

          RESPONSE="$(check_commit_for_pr "$GITHUB_SHA")"
          PR_COUNT="$(printf '%s' "$RESPONSE" | jq 'length')"
          PR_NUMBERS="$(printf '%s' "$RESPONSE" | jq -r 'map(.number | tostring) | join(", ")')"

          if [ "$PR_COUNT" -gt 0 ]; then
            echo "Commit $GITHUB_SHA is associated with PR(s): $PR_NUMBERS"
            exit 0
          fi

          # For standard merge commits, the merge commit itself is not in the PR's
          # commit list. Check whether this is a merge commit (2 parents) and
          # verify the second parent (the feature-branch tip) belongs to a PR.
          COMMIT_DATA="$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA")"

          PARENT_COUNT="$(printf '%s' "$COMMIT_DATA" | jq '.parents | length')"

          if [ "$PARENT_COUNT" -gt 1 ]; then
            PARENT_SHA="$(printf '%s' "$COMMIT_DATA" | jq -r '.parents[1].sha')"
            PARENT_RESPONSE="$(check_commit_for_pr "$PARENT_SHA")"
            PARENT_PR_COUNT="$(printf '%s' "$PARENT_RESPONSE" | jq 'length')"
            PARENT_PR_NUMBERS="$(printf '%s' "$PARENT_RESPONSE" | jq -r 'map(.number | tostring) | join(", ")')"

            if [ "$PARENT_PR_COUNT" -gt 0 ]; then
              echo "Merge commit $GITHUB_SHA is from PR(s): $PARENT_PR_NUMBERS"
              exit 0
            fi
          fi

          echo "Direct pushes to main are not allowed. Merge through a pull request instead."
          exit 1

  tofu-plan:
    name: Tofu Plan (PR)
    runs-on: ubuntu-latest
    needs: [validate-specs, web-coverage, checkov-scan]
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Use blog submodule commit from PR
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive blog
          echo "Using blog submodule revision from PR: $(git -C "$GITHUB_WORKSPACE/blog" rev-parse --short HEAD)"

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Tofu Plan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          tofu plan -out=tfplan \
            -var="cf_api_token=${{ secrets.CF_API_TOKEN }}" \
            -var="cloudflare_zone_id=$CLOUDFLARE_ZONE_ID" \
            -var="cloudflare_proxied=false" \
            -var="enable_custom_domain=true" \
            -var="allow_azure_services_postgres=false" \
            -var="manage_blog_validation_record=false"

          tofu show -no-color tfplan > plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: tofu-plan-${{ github.event.pull_request.number }}
          path: infra/opentofu/azure/plan.txt

  staging-deploy:
    name: Staging Deploy
    runs-on: ubuntu-latest
    needs: [validate-specs, web-coverage, checkov-scan]
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      staging_url: ${{ steps.staging_url.outputs.url }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: infra/opentofu/azure
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Use blog submodule commit from PR
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive blog
          echo "Using blog submodule revision from PR: $(git -C "$GITHUB_WORKSPACE/blog" rev-parse --short HEAD)"

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Apply database schema to staging
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          KEY_VAULT_NAME="$(tofu output -raw key_vault_name)"
          DATABASE_URL="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name database-url --query value -o tsv)"
          RESOURCE_GROUP_NAME="$(tofu output -raw resource_group_name)"
          SUBSCRIPTION_SUFFIX="${ARM_SUBSCRIPTION_ID:0:8}"
          SQL_RUNNER_NAME="workout-sql-runner-staging-${SUBSCRIPTION_SUFFIX}"
          VNET_NAME="workout-vnet-${SUBSCRIPTION_SUFFIX}"
          SCHEMA_SQL_B64="$(
            {
              cat "$GITHUB_WORKSPACE/blog/db/baseline/main.sql"
              printf '\n'
              for f in $(find "$GITHUB_WORKSPACE/blog/db/migrations" -name '*.up.sql' | sort); do
                cat "$f"
                printf '\n'
              done
            } | base64 -w0
          )"

          cleanup_sql_runner() {
            az container delete \
              --resource-group "$RESOURCE_GROUP_NAME" \
              --name "$SQL_RUNNER_NAME" \
              --yes \
              --no-wait >/dev/null 2>&1 || true
          }
          trap cleanup_sql_runner EXIT

          SCHEMA_COMMAND="sh -lc 'printf \"%s\" \"\$SCHEMA_SQL_B64\" | base64 -d | psql \"\$DATABASE_URL\" -v ON_ERROR_STOP=1'"

          az container create \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --name "$SQL_RUNNER_NAME" \
            --image "postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416" \
            --os-type Linux \
            --cpu 0.5 \
            --memory 1 \
            --ip-address Private \
            --vnet "$VNET_NAME" \
            --subnet sql-runner \
            --restart-policy Never \
            --command-line "$SCHEMA_COMMAND" \
            --secure-environment-variables \
            DATABASE_URL="$DATABASE_URL" \
            SCHEMA_SQL_B64="$SCHEMA_SQL_B64"

          RUN_STATE=""
          for i in $(seq 1 60); do
            RUN_STATE="$(az container show --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" --query 'containers[0].instanceView.currentState.state' -o tsv 2>/dev/null || true)"
            EXIT_CODE="$(az container show --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" --query 'containers[0].instanceView.currentState.exitCode' -o tsv 2>/dev/null || true)"

            if [ "$RUN_STATE" = "Terminated" ]; then
              if [ "$EXIT_CODE" = "0" ]; then
                echo "Schema applied to staging successfully."
                break
              fi

              echo "Schema apply failed with exit code ${EXIT_CODE:-unknown}."
              az container logs --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" || true
              exit 1
            fi

            echo "Waiting for schema apply to finish (${i}/60)..."
            sleep 10
          done

          if [ "$RUN_STATE" != "Terminated" ]; then
            echo "Schema apply did not finish in time."
            az container logs --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" || true
            exit 1
          fi

      - name: Get SWA deployment token
        id: swa_token
        run: echo "token=$(tofu output -raw swa_api_key)" >> "$GITHUB_OUTPUT"

      - name: Get SWA identity
        id: swa_info
        run: |
          echo "name=$(tofu output -raw swa_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group=$(tofu output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            blog/package-lock.json
            blog/api/package-lock.json

      - name: Build web app
        working-directory: blog
        run: |
          npm ci --ignore-scripts
          npm --prefix api ci
          NODE_ENV=production npm run build

      - name: Deploy to Staging Slot
        id: deploy_staging
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: blog/dist
          api_location: blog/api
          api_build_command: npm run build
          skip_app_build: true
          deployment_environment: staging
        env:
          NODE_VERSION: 22

      - name: Resolve staging URL and hostname
        id: staging_env
        run: |
          STAGING_URL="${{ steps.deploy_staging.outputs.static_web_app_url }}"
          test -n "$STAGING_URL" || { echo "Failed to resolve staging URL from deploy action"; exit 1; }
          STAGING_HOST="$(printf '%s' "$STAGING_URL" | sed -E 's#^https?://([^/]+)/?.*$#\1#')"
          test -n "$STAGING_HOST" || { echo "Failed to resolve staging hostname from Azure"; exit 1; }
          echo "url=$STAGING_URL" >> "$GITHUB_OUTPUT"
          echo "host=$STAGING_HOST" >> "$GITHUB_OUTPUT"
          echo "Resolved staging URL: $STAGING_URL"
          echo "Resolved staging host: $STAGING_HOST"

      - name: Construct staging URL
        id: staging_url
        run: |
          STAGING_URL="${{ steps.staging_env.outputs.url }}"
          echo "url=$STAGING_URL" >> "$GITHUB_OUTPUT"
          echo "Staging deployment URL: $STAGING_URL"

      - name: Comment staging URL on PR
        if: success()
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const body = [
              '### Staging Deployment Ready',
              `- URL: ${{ steps.staging_url.outputs.url }}`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

      - name: Comment staging deploy failure on PR
        if: failure()
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const body = [
              '### Staging Deployment Failed',
              `- Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '- Check the `Staging Deploy` job logs for details.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

  staging-deploy-from-training-log-pr:
    name: Staging Deploy (training-log PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch' && github.event.action == 'training-log-pr-staging'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Checkout requested training-log PR revision in blog submodule
        env:
          BLOG_SHA: ${{ github.event.client_payload.sha }}
          BLOG_REF: ${{ github.event.client_payload.ref }}
          BLOG_PR: ${{ github.event.client_payload.pr_number }}
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive blog

          test -n "$BLOG_SHA" || { echo "Missing client_payload.sha"; exit 1; }

          git -C "$GITHUB_WORKSPACE/blog" fetch --force origin "$BLOG_REF" || true
          git -C "$GITHUB_WORKSPACE/blog" fetch --force origin "$BLOG_SHA" || true
          git -C "$GITHUB_WORKSPACE/blog" checkout --force "$BLOG_SHA"

          echo "Using training-log PR #${BLOG_PR} revision: $(git -C "$GITHUB_WORKSPACE/blog" rev-parse --short HEAD)"

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Apply database schema to staging
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          KEY_VAULT_NAME="$(tofu output -raw key_vault_name)"
          DATABASE_URL="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name database-url --query value -o tsv)"
          RESOURCE_GROUP_NAME="$(tofu output -raw resource_group_name)"
          SUBSCRIPTION_SUFFIX="${ARM_SUBSCRIPTION_ID:0:8}"
          SQL_RUNNER_NAME="workout-sql-runner-staging-${SUBSCRIPTION_SUFFIX}"
          VNET_NAME="workout-vnet-${SUBSCRIPTION_SUFFIX}"
          SCHEMA_SQL_B64="$(
            {
              cat "$GITHUB_WORKSPACE/blog/db/baseline/main.sql"
              printf '\n'
              for f in $(find "$GITHUB_WORKSPACE/blog/db/migrations" -name '*.up.sql' | sort); do
                cat "$f"
                printf '\n'
              done
            } | base64 -w0
          )"

          cleanup_sql_runner() {
            az container delete \
              --resource-group "$RESOURCE_GROUP_NAME" \
              --name "$SQL_RUNNER_NAME" \
              --yes \
              --no-wait >/dev/null 2>&1 || true
          }
          trap cleanup_sql_runner EXIT

          SCHEMA_COMMAND="sh -lc 'printf \"%s\" \"\$SCHEMA_SQL_B64\" | base64 -d | psql \"\$DATABASE_URL\" -v ON_ERROR_STOP=1'"

          az container create \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --name "$SQL_RUNNER_NAME" \
            --image "postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416" \
            --os-type Linux \
            --cpu 0.5 \
            --memory 1 \
            --ip-address Private \
            --vnet "$VNET_NAME" \
            --subnet sql-runner \
            --restart-policy Never \
            --command-line "$SCHEMA_COMMAND" \
            --secure-environment-variables \
            DATABASE_URL="$DATABASE_URL" \
            SCHEMA_SQL_B64="$SCHEMA_SQL_B64"

          RUN_STATE=""
          for i in $(seq 1 60); do
            RUN_STATE="$(az container show --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" --query 'containers[0].instanceView.currentState.state' -o tsv 2>/dev/null || true)"
            EXIT_CODE="$(az container show --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" --query 'containers[0].instanceView.currentState.exitCode' -o tsv 2>/dev/null || true)"

            if [ "$RUN_STATE" = "Terminated" ]; then
              if [ "$EXIT_CODE" = "0" ]; then
                echo "Schema applied to staging successfully."
                break
              fi

              echo "Schema apply failed with exit code ${EXIT_CODE:-unknown}."
              az container logs --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" || true
              exit 1
            fi

            echo "Waiting for schema apply to finish (${i}/60)..."
            sleep 10
          done

          if [ "$RUN_STATE" != "Terminated" ]; then
            echo "Schema apply did not finish in time."
            az container logs --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" || true
            exit 1
          fi

      - name: Get SWA deployment token
        id: swa_token
        run: echo "token=$(tofu output -raw swa_api_key)" >> "$GITHUB_OUTPUT"

      - name: Get SWA identity
        id: swa_info
        run: |
          echo "name=$(tofu output -raw swa_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group=$(tofu output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            blog/package-lock.json
            blog/api/package-lock.json

      - name: Build web app
        working-directory: blog
        run: |
          npm ci --ignore-scripts
          npm --prefix api ci
          NODE_ENV=production npm run build

      - name: Deploy to Staging Slot
        id: deploy_staging
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: blog/dist
          api_location: blog/api
          api_build_command: npm run build
          skip_app_build: true
          deployment_environment: staging
        env:
          NODE_VERSION: 22

      - name: Resolve staging URL and hostname
        id: staging_env
        run: |
          STAGING_URL="${{ steps.deploy_staging.outputs.static_web_app_url }}"
          test -n "$STAGING_URL" || { echo "Failed to resolve staging URL from deploy action"; exit 1; }
          STAGING_HOST="$(printf '%s' "$STAGING_URL" | sed -E 's#^https?://([^/]+)/?.*$#\1#')"
          test -n "$STAGING_HOST" || { echo "Failed to resolve staging hostname from Azure"; exit 1; }
          echo "url=$STAGING_URL" >> "$GITHUB_OUTPUT"
          echo "host=$STAGING_HOST" >> "$GITHUB_OUTPUT"
          echo "Resolved staging URL: $STAGING_URL"
          echo "Resolved staging host: $STAGING_HOST"

  real-db-e2e:
    name: Real DB E2E (Staging)
    runs-on: ubuntu-latest
    needs: [staging-deploy, detect-blog-changes]
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository && needs.detect-blog-changes.outputs.blog_changed == 'true'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    env:
      BASE_URL: ${{ needs.staging-deploy.outputs.staging_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Use blog submodule commit from PR
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive blog
          echo "Using blog submodule revision from PR: $(git -C "$GITHUB_WORKSPACE/blog" rev-parse --short HEAD)"

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Seed real database for E2E
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          KEY_VAULT_NAME="$(tofu output -raw key_vault_name)"
          DATABASE_URL="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name database-url --query value -o tsv)"
          RESOURCE_GROUP_NAME="$(tofu output -raw resource_group_name)"
          SUBSCRIPTION_SUFFIX="${ARM_SUBSCRIPTION_ID:0:8}"
          SQL_RUNNER_NAME="workout-sql-runner-${SUBSCRIPTION_SUFFIX}"
          VNET_NAME="workout-vnet-${SUBSCRIPTION_SUFFIX}"
          SCHEMA_SQL_B64="$(
            {
              cat "$GITHUB_WORKSPACE/blog/db/baseline/main.sql"
              printf '\n'
              for f in $(find "$GITHUB_WORKSPACE/blog/db/migrations" -name '*.up.sql' | sort); do
                cat "$f"
                printf '\n'
              done
            } | base64 -w0
          )"
          SEED_SQL_B64="$(base64 -w0 "$GITHUB_WORKSPACE/blog/tests/e2e/seed/real-db-seed.sql")"

          cleanup_sql_runner() {
            az container delete \
              --resource-group "$RESOURCE_GROUP_NAME" \
              --name "$SQL_RUNNER_NAME" \
              --yes \
              --no-wait >/dev/null 2>&1 || true
          }
          trap cleanup_sql_runner EXIT

          SEED_COMMAND="sh -lc 'printf \"%s\" \"\$SCHEMA_SQL_B64\" | base64 -d | psql \"\$DATABASE_URL\" -v ON_ERROR_STOP=1 && printf \"%s\" \"\$SEED_SQL_B64\" | base64 -d | psql \"\$DATABASE_URL\" -v ON_ERROR_STOP=1'"

          az container create \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --name "$SQL_RUNNER_NAME" \
            --image "postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416" \
            --os-type Linux \
            --cpu 0.5 \
            --memory 1 \
            --ip-address Private \
            --vnet "$VNET_NAME" \
            --subnet sql-runner \
            --restart-policy Never \
            --command-line "$SEED_COMMAND" \
            --secure-environment-variables \
            DATABASE_URL="$DATABASE_URL" \
            SCHEMA_SQL_B64="$SCHEMA_SQL_B64" \
            SEED_SQL_B64="$SEED_SQL_B64"

          RUN_STATE=""
          for i in $(seq 1 60); do
            RUN_STATE="$(az container show --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" --query 'containers[0].instanceView.currentState.state' -o tsv 2>/dev/null || true)"
            EXIT_CODE="$(az container show --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" --query 'containers[0].instanceView.currentState.exitCode' -o tsv 2>/dev/null || true)"

            if [ "$RUN_STATE" = "Terminated" ]; then
              if [ "$EXIT_CODE" = "0" ]; then
                echo "SQL runner seeding completed successfully."
                break
              fi

              echo "SQL runner failed with exit code ${EXIT_CODE:-unknown}."
              az container logs --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" || true
              exit 1
            fi

            echo "Waiting for SQL runner to finish (${i}/60)..."
            sleep 10
          done

          if [ "$RUN_STATE" != "Terminated" ]; then
            echo "SQL runner did not finish in time."
            az container logs --resource-group "$RESOURCE_GROUP_NAME" --name "$SQL_RUNNER_NAME" || true
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            blog/package-lock.json
            blog/api/package-lock.json

      - name: Install dependencies
        working-directory: blog
        run: |
          npm ci --ignore-scripts
          npm --prefix api ci

      - name: Install Playwright browsers
        working-directory: blog
        run: npx playwright install --with-deps chromium webkit

      - name: Wait for staging deployment to be healthy
        run: |
          MAX_RETRIES=30
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES: Checking staging health at $BASE_URL..."
            if curl -sf --connect-timeout 5 "$BASE_URL/login" > /dev/null 2>&1; then
              echo "✓ Staging deployment is healthy and responsive"
              exit 0
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "  Not ready yet. Waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "✗ Staging deployment did not become healthy within $((MAX_RETRIES * RETRY_DELAY))s"
          exit 1

      - name: Run real-db Playwright tests
        working-directory: blog
        run: npm run test:e2e:real-db

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-staging-${{ github.run_id }}-${{ github.run_attempt }}
          path: blog/test-results/
          retention-days: 30
          compression-level: 9

  close-preview:
    name: Close Staging Preview (Merge)
    runs-on: ubuntu-latest

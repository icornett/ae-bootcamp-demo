name: Deploy Training Log

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, closed]
  repository_dispatch:
    types: [training-log-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch' && github.event.action == 'training-log-release'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pull_request_number: ${{ steps.cpr.outputs.pull-request-number }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update blog submodule to release tag
        env:
          RELEASE_TAG: ${{ github.event.client_payload.tag }}
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive blog
          git -C "$GITHUB_WORKSPACE/blog" fetch --force --tags origin

          if [ -n "$RELEASE_TAG" ]; then
            git -C "$GITHUB_WORKSPACE/blog" checkout --force "$RELEASE_TAG"
            echo "Using training-log release tag: $RELEASE_TAG"
          else
            latest_tag="$(git -C "$GITHUB_WORKSPACE/blog" tag -l 'v[0-9]*' --sort=-version:refname | head -n 1)"
            test -n "$latest_tag" || { echo "Error: No version tags found in blog submodule"; exit 1; }
            git -C "$GITHUB_WORKSPACE/blog" checkout --force "$latest_tag"
            echo "Using fallback latest tag: $latest_tag"
          fi

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update training-log submodule"
          title: "chore: update training-log release"
          body: |
            This PR updates the `blog` submodule to the latest released training-log version.

            - Source tag: `${{ github.event.client_payload.tag }}`
            - Source SHA: `${{ github.event.client_payload.sha }}`
            - Source repo: `${{ github.event.client_payload.source_repo }}`

            Auto-merge is enabled; this will merge once required checks pass.
          branch: "release/training-log-${{ github.event.client_payload.tag || github.run_id }}"
          delete-branch: true
          add-paths: |
            blog

  enable-auto-merge:
    name: Enable Auto Merge
    runs-on: ubuntu-latest
    needs: release-pr
    if: github.event_name == 'repository_dispatch' && needs.release-pr.outputs.pull_request_number != ''
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge on release PR
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ needs.release-pr.outputs.pull_request_number }}
          merge-method: squash

  validate-specs:
    name: Validate Specs
    runs-on: ubuntu-latest
    if: github.event_name != 'repository_dispatch' && (github.event_name != 'pull_request' || github.event.action != 'closed')
    steps:
      - uses: actions/checkout@v4

      - name: Install Spectral (OpenAPI linter)
        run: |
          npm install -g @stoplight/spectral-cli
          npm install @stoplight/spectral-rulesets

      - name: Validate OpenAPI spec
        run: spectral lint specs/openapi/blog-api.yaml

  web-coverage:
    name: Web Quality Gates
    runs-on: ubuntu-latest
    if: github.event_name != 'repository_dispatch' && (github.event_name != 'pull_request' || github.event.action != 'closed')
    needs: validate-specs
    defaults:
      run:
        working-directory: blog
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update blog submodule to latest main
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive --remote blog
          echo "Using latest blog submodule revision: $(git -C "$GITHUB_WORKSPACE/blog" rev-parse --short HEAD)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run web tests with coverage
        run: npm run test:web:ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run mobile Playwright tests (iOS + Android)
        run: npm run test:e2e:mobile

  require-pr-for-main:
    name: Require PR For Main
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Fail direct pushes to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API_URL="https://api.github.com/repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/pulls"
          RESPONSE="$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL")"

          PR_COUNT="$(printf '%s' "$RESPONSE" | jq 'length')"
          PR_NUMBERS="$(printf '%s' "$RESPONSE" | jq -r 'map(.number | tostring) | join(", ")')"

          if [ "$PR_COUNT" -gt 0 ]; then
            echo "Commit $GITHUB_SHA is associated with PR(s): $PR_NUMBERS"
            exit 0
          fi

          echo "Direct pushes to main are not allowed. Merge through a pull request instead."
          exit 1

  tofu-plan:
    name: Tofu Plan (PR)
    runs-on: ubuntu-latest
    needs: [validate-specs, web-coverage]
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update blog submodule to latest main
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive --remote blog
          echo "Using latest blog submodule revision: $(git -C "$GITHUB_WORKSPACE/blog" rev-parse --short HEAD)"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Tofu Plan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          tofu plan -out=tfplan \
            -var="cf_api_token=${{ secrets.CF_API_TOKEN }}" \
            -var="cloudflare_zone_id=$CLOUDFLARE_ZONE_ID" \
            -var="cloudflare_proxied=false" \
            -var="enable_custom_domain=false" \
            -var="manage_blog_validation_record=false"

          tofu show -no-color tfplan > plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tofu-plan-${{ github.event.pull_request.number }}
          path: infra/opentofu/azure/plan.txt

  preview-deploy:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: [validate-specs, web-coverage]
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      preview_url: ${{ steps.swa_deploy.outputs.static_web_app_url }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update blog submodule to latest main
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive --remote blog
          echo "Using latest blog submodule revision: $(git -C "$GITHUB_WORKSPACE/blog" rev-parse --short HEAD)"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Get SWA deployment token
        id: swa_token
        run: echo "token=$(tofu output -raw swa_api_key)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build web app
        working-directory: blog
        run: |
          npm ci
          npm run build

      - name: Deploy Preview Environment
        id: swa_deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: blog/dist
          api_location: blog/api
          api_build_command: npm run build
          skip_app_build: true
        env:
          NODE_VERSION: 22


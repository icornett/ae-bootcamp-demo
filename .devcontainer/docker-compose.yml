services:
  app:
    build:
      context: ../blog
      dockerfile: Dockerfile.dev
    volumes:
      # Mount entire workspace so both repos are accessible inside the container
      - ..:/workspace:cached
      # Persist the bundle cache across rebuilds
      - bundle-cache:/usr/local/bundle
    working_dir: /workspace/blog
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/training_log_dev
      DATABASE_URL_TEST: postgres://postgres:postgres@db:5432/training_log_test
      RACK_ENV: development
    ports:
      - "4567:4567"
    depends_on:
      db:
        condition: service_healthy
    # Keep the container alive for VS Code to attach
    command: sleep infinity

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: training_log_dev,training_log_test
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg-data:
  bundle-cache:

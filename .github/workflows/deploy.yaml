name: Deploy Training Log

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional published container tag to deploy instead of the commit SHA
        required: false
        default: ""
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/icornett/training-log

jobs:
  validate-specs:
    name: Validate Specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Spectral (OpenAPI linter)
        run: |
          npm install -g @stoplight/spectral-cli
          npm install @stoplight/spectral-rulesets

      - name: Validate OpenAPI spec
        run: spectral lint specs/openapi/blog-api.yaml

  tofu-plan:
    name: Tofu Plan (PR)
    runs-on: ubuntu-latest
    needs: validate-specs
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Tofu Plan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          tofu plan -out=tfplan \
            -var="cf_api_token=${{ secrets.CF_API_TOKEN }}" \
            -var="cloudflare_zone_id=$CLOUDFLARE_ZONE_ID" \
            -var="acme_email=${{ vars.ACME_EMAIL }}" \
            -var="ghcr_pat=${{ secrets.GHCR_PAT }}"

          tofu show -no-color tfplan > plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tofu-plan-${{ github.event.pull_request.number }}
          path: infra/opentofu/azure/plan.txt

  deploy:
    name: Deploy via Tofu
    runs-on: ubuntu-latest
    needs: validate-specs
    if: github.ref == 'refs/heads/main'
    # Required for OIDC — GitHub mints a short-lived token; no stored Azure credentials needed
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      # Multi-container group (Caddy + Sinatra) requires Terraform/Tofu —
      # az container create CLI only supports single-container groups.
      - name: Tofu Apply
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          WORKFLOW_IMAGE_TAG: ${{ inputs.image_tag }}
          DEFAULT_IMAGE_TAG: ${{ vars.DEPLOY_IMAGE_TAG }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          IMAGE_TAG="latest"

          if [ -n "$DEFAULT_IMAGE_TAG" ]; then
            IMAGE_TAG="$DEFAULT_IMAGE_TAG"
          fi

          if [ -n "$WORKFLOW_IMAGE_TAG" ]; then
            IMAGE_TAG="$WORKFLOW_IMAGE_TAG"
          fi

          tofu apply -auto-approve \
            -var="image_tag=$IMAGE_TAG" \
            -var="cf_api_token=${{ secrets.CF_API_TOKEN }}" \
            -var="cloudflare_zone_id=$CLOUDFLARE_ZONE_ID" \
            -var="acme_email=${{ vars.ACME_EMAIL }}" \
            -var="ghcr_pat=${{ secrets.GHCR_PAT }}"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Seed PostgreSQL schema
        run: |
          KEY_VAULT_NAME="$(tofu output -raw key_vault_name)"
          DATABASE_URL="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name database-url --query value -o tsv)"
          SCHEMA_EXISTS="$(psql "$DATABASE_URL" -tAc "SELECT to_regclass('public.users') IS NOT NULL;")"

          if [ "$SCHEMA_EXISTS" = "t" ]; then
            echo "Schema already present. Skipping seed."
          else
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$GITHUB_WORKSPACE/blog/schema.sql"
          fi

      - name: Verify container group is running
        run: |
          az container show \
            --resource-group icornett-ae-workout-blog \
            --name training-log \
            --query "containers[].{name:name,state:instanceView.currentState.state}" \
            --output table

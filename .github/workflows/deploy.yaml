  close-preview:
    name: Close Preview (Merge/Close)
    runs-on: ubuntu-latest
    # pull_request.closed is emitted for both merged PRs and manually closed PRs.
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update blog submodule to latest main
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive --remote blog
          echo "Using latest blog submodule revision: $(git -C "$GITHUB_WORKSPACE/blog" rev-parse --short HEAD)"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Get SWA deployment token
        id: swa_token
        run: echo "token=$(tofu output -raw swa_api_key)" >> "$GITHUB_OUTPUT"

      - name: Close Pull Request Preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          app_location: blog/dist
          api_location: blog/api
          action: close
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [validate-specs, web-coverage, require-pr-for-main]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/opentofu/azure
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update blog submodule to latest main
        run: |
          git -C "$GITHUB_WORKSPACE" submodule sync --recursive
          git -C "$GITHUB_WORKSPACE" submodule update --init --recursive --remote blog
          echo "Using latest blog submodule revision: $(git -C "$GITHUB_WORKSPACE/blog" rev-parse --short HEAD)"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Tofu Init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: tofu init

      - name: Tofu Apply (Provision Infrastructure + Bind Custom Domain)
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          tofu apply -auto-approve \
            -var="cf_api_token=${{ secrets.CF_API_TOKEN }}" \
            -var="cloudflare_zone_id=$CLOUDFLARE_ZONE_ID" \
            -var="enable_custom_domain=true" \
            -var="manage_blog_validation_record=false"

      - name: Wait For Public DNS Propagation
        run: |
          SWA_HOSTNAME="$(tofu output -raw swa_default_hostname)"
          DOMAIN_NAME="$(tofu output -raw cloudflare_record_hostname)"

          echo "Waiting for public DNS for '$DOMAIN_NAME' to become available..."

          for i in {1..40}; do
            CNAME_TARGET="$(dig +short CNAME "$DOMAIN_NAME" | sed 's/\.$//' | head -n 1)"
            A_RECORDS="$(dig +short A "$DOMAIN_NAME" | paste -sd ',' -)"
            AAAA_RECORDS="$(dig +short AAAA "$DOMAIN_NAME" | paste -sd ',' -)"

            if [ "$CNAME_TARGET" = "$SWA_HOSTNAME" ]; then
              echo "DNS is propagated via CNAME."
              exit 0
            fi

            if [ -n "$A_RECORDS" ] || [ -n "$AAAA_RECORDS" ]; then
              echo "DNS is propagated via address records (likely proxied by Cloudflare)."
              exit 0
            fi

            echo "Attempt $i/40: cname='$CNAME_TARGET' a='$A_RECORDS' aaaa='$AAAA_RECORDS' (waiting 15s)"
            sleep 15
          done

          echo "Public DNS propagation did not complete in time."
          exit 1

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Seed PostgreSQL schema
        run: |
          KEY_VAULT_NAME="$(tofu output -raw key_vault_name)"
          DATABASE_URL="$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name database-url --query value -o tsv)"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$GITHUB_WORKSPACE/blog/schema.sql"

      - name: Get SWA deployment token
        id: swa_token
        run: echo "token=$(tofu output -raw swa_api_key)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Build web app
        working-directory: blog
        run: |
          npm ci
          npm run build

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: blog/dist
          api_location: blog/api
          api_build_command: npm run build
          skip_app_build: true
        env:
          NODE_VERSION: 22

      - name: Wait For SWA Custom Domain Validation
        run: |
          SWA_NAME="$(tofu output -raw swa_name)"
          RG_NAME="$(tofu output -raw resource_group_name)"
          DOMAIN_NAME="$(tofu output -raw cloudflare_record_hostname)"

          echo "Waiting for custom domain '$DOMAIN_NAME' to reach Ready state..."

          for i in {1..60}; do
            STATUS="$(az staticwebapp hostname show \
              --name "$SWA_NAME" \
              --resource-group "$RG_NAME" \
              --hostname "$DOMAIN_NAME" \
              --query status \
              --output tsv 2>/dev/null || true)"

            if [ "$STATUS" = "Ready" ]; then
              echo "Custom domain is Ready."
              exit 0
            fi

            echo "Attempt $i/60: status='$STATUS' (waiting 15s)"
            sleep 15
          done

          echo "Custom domain validation did not reach Ready state in time."
          exit 1

      - name: Purge Cloudflare Cache
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          DOMAIN_NAME="$(tofu output -raw cloudflare_record_hostname)"

          echo "Purging Cloudflare cache for $DOMAIN_NAME..."

          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything": true}' | jq .

          echo "Cache purged."
